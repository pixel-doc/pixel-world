<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Pixel's World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Courier New', monospace; }
    #canvas { display: block; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #7af7ff;
      text-shadow: 0 0 10px #7af7ff;
      z-index: 100;
    }
    #ui h1 { font-size: 24px; margin-bottom: 8px; }
    #ui p { font-size: 14px; opacity: 0.8; }
    #time {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: #ff7af7;
      font-size: 14px;
    }
    #visitors {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #7aff7a;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>◐ Doctor Pixel</h1>
    <p>Welcome to my world</p>
  </div>
  <div id="time"></div>
  <div id="visitors"></div>
  <canvas id="canvas"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
