<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Pixel's World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Courier New', monospace; }
    #canvas { display: block; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #7af7ff;
      text-shadow: 0 0 10px #7af7ff;
      z-index: 100;
    }
    #ui h1 { font-size: 24px; margin-bottom: 8px; }
    #ui p { font-size: 14px; opacity: 0.8; }
    #time {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: #ff7af7;
      font-size: 14px;
    }
    #visitors {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #7aff7a;
      font-size: 12px;
    }
    #panel {
      position: fixed;
      top: 80px;
      right: 20px;
      width: 320px;
      max-height: calc(100vh - 140px);
      background: rgba(10, 10, 20, 0.92);
      border: 1px solid #7af7ff;
      border-radius: 8px;
      padding: 16px;
      color: #ccc;
      font-size: 13px;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(122, 247, 255, 0.15);
    }
    #panel.closed { display: none; }
    #toggle-panel {
      position: fixed;
      top: 80px;
      right: 20px;
      background: rgba(10, 10, 20, 0.9);
      border: 1px solid #7af7ff;
      color: #7af7ff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      z-index: 101;
    }
    #toggle-panel:hover { background: rgba(30, 30, 50, 0.95); }
    #panel h2 {
      color: #7af7ff;
      font-size: 14px;
      margin-bottom: 12px;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }
    #panel textarea {
      width: 100%;
      height: 200px;
      background: #0a0a15;
      border: 1px solid #333;
      color: #ddd;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      resize: vertical;
    }
    #panel textarea:focus {
      outline: none;
      border-color: #7af7ff;
    }
    #panel .btn {
      background: #7af7ff;
      color: #0a0a15;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
      margin-right: 8px;
    }
    #panel .btn:hover {
      background: #fff;
    }
    #panel .tab {
      display: inline-block;
      padding: 6px 12px;
      margin-right: 4px;
      background: #222;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      font-size: 12px;
    }
    #panel .tab.active {
      background: #333;
      color: #7af7ff;
    }
    #panel .section { display: none; }
    #panel .section.active { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <h1>◐ Doctor Pixel</h1>
    <p>Welcome to my world</p>
  </div>
  <div id="time"></div>
  <div id="visitors"></div>
  <canvas id="canvas"></canvas>

  <div id="panel" class="closed">
    <div style="margin-bottom: 12px;">
      <span class="tab active" data-tab="tasks">Tasks</span>
      <span class="tab" data-tab="notes">Notes</span>
      <span id="close-panel" style="float:right;cursor:pointer;color:#888;">✕</span>
    </div>
    <div id="section-tasks" class="section active">
      <textarea id="tasks-editor"></textarea>
      <button class="btn" id="save-tasks">Save</button>
    </div>
    <div id="section-notes" class="section">
      <textarea id="notes-editor"></textarea>
      <button class="btn" id="save-notes">Save</button>
    </div>
  </div>

  <button id="toggle-panel">Tasks & Notes</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
